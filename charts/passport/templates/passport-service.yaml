apiVersion: v1
kind: Service
metadata:
  name: drycc-passport
  annotations:
    {{- with .Values.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    app: drycc-passport
    heritage: drycc
    component: drycc-passport-api
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8000
  selector:
    app: drycc-passport
    component: drycc-passport-api
